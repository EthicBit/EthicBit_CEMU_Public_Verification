name: Production Distributed Ready Final

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  production-distributed-ready-final:
    runs-on: ubuntu-latest
    env:
      ETHICBIT_ED25519_SIGN_CMD: assurance/signers/ed25519_sign.sh {payload}
      ETHICBIT_MLDSA_SIGN_CMD: assurance/signers/mldsa_sign.sh {payload}
      ETHICBIT_ED25519_VERIFY_CMD: assurance/signers/ed25519_verify.sh {payload} {signature}
      ETHICBIT_MLDSA_VERIFY_CMD: assurance/signers/mldsa_verify.sh {payload} {signature}
      ETHICBIT_ME_GATE_REQUIRED_SECTORS: CORE,JUSTICIA,FINANZAS,SECURITY,TECHNICAL,LEGAL,REGULATORY
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Node dependencies
        run: npm ci

      - name: Prepare CI hybrid signing keys
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p assurance/keys
          openssl genpkey -algorithm Ed25519 -out assurance/keys/ed25519_private.pem
          openssl pkey -in assurance/keys/ed25519_private.pem -pubout -out assurance/keys/ed25519_public.pem
          openssl genpkey -algorithm Ed25519 -out assurance/keys/mldsa_private.pem
          openssl pkey -in assurance/keys/mldsa_private.pem -pubout -out assurance/keys/mldsa_public.pem
          for key_file in assurance/keys/ed25519_private.pem assurance/keys/ed25519_public.pem assurance/keys/mldsa_private.pem assurance/keys/mldsa_public.pem; do
            if [ ! -s "$key_file" ]; then
              echo "Missing generated signing key material: $key_file" >&2
              exit 1
            fi
          done
          chmod 600 assurance/keys/*.pem

      - name: Export key paths
        shell: bash
        run: |
          {
            echo "ETHICBIT_ED25519_PRIVATE_KEY=${{ github.workspace }}/assurance/keys/ed25519_private.pem"
            echo "ETHICBIT_ED25519_PUBLIC_KEY=${{ github.workspace }}/assurance/keys/ed25519_public.pem"
            echo "ETHICBIT_MLDSA_PRIVATE_KEY=${{ github.workspace }}/assurance/keys/mldsa_private.pem"
            echo "ETHICBIT_MLDSA_PUBLIC_KEY=${{ github.workspace }}/assurance/keys/mldsa_public.pem"
          } >> "$GITHUB_ENV"

      - name: Run constitutional fail-closed gate
        run: |
          chmod +x scripts/audit/verify_constitutional_controls.sh
          ./scripts/audit/verify_constitutional_controls.sh

      - name: Require canonical mechanical ethics gate
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          required = [
              "CORE",
              "JUSTICIA",
              "FINANZAS",
              "SECURITY",
              "TECHNICAL",
              "LEGAL",
              "REGULATORY",
          ]

          gate_path = Path("results/mechanical_ethics_gate.json")
          if not gate_path.exists():
              raise SystemExit("Missing results/mechanical_ethics_gate.json")

          gate = json.loads(gate_path.read_text(encoding="utf-8"))
          status = gate.get("status")
          if status != "PASS":
              raise SystemExit(f"Mechanical ethics gate status is not PASS: {status}")

          validated = set(gate.get("validated_sectors", []))
          missing_required = [sector for sector in required if sector not in validated]
          if missing_required:
              raise SystemExit(
                  "Mechanical ethics gate missing required sectors: "
                  + ",".join(missing_required)
              )

          if gate.get("claim_level_ceiling") != "L4":
              raise SystemExit(
                  "Mechanical ethics gate claim_level_ceiling must be L4 for production check"
              )

          if gate.get("l4_foundational_validated") is not True:
              raise SystemExit("Mechanical ethics gate L4 foundational validation is not true")

          print("mechanical_ethics_gate: PASS (all required sectors + L4 validated)")
          PY

      - name: Run final readiness gate
        run: python3 tools/checks/check_production_distributed_ready_final.py

      - name: Require generated final readiness artifacts
        run: |
          test -f results/constitutional_controls_report.json
          test -f reports/final_checks/production_distributed_ready_final_check.json
          test -f artifacts/production_distributed_readiness_certificate_final.json
          test -f logs/production_distributed_ready_final.log
