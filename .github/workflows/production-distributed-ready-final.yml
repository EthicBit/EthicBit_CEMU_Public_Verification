name: Production Distributed Ready Final

on:
  pull_request:
    branches:
      - main
  workflow_dispatch::

permissions:
  contents: read

jobs:
  production-distributed-ready-final:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run constitutional fail-closed gate
        run: |
          chmod +x scripts/audit/verify_constitutional_controls.sh
          ./scripts/audit/verify_constitutional_controls.sh

      - name: Run final readiness gate
        run: python3 tools/checks/check_production_distributed_ready_final.py

      - name: Require generated final readiness artifacts
        run: |
          test -f results/constitutional_controls_report.json
          test -f reports/final_checks/production_distributed_ready_final_check.json
          test -f artifacts/production_distributed_readiness_certificate_final.json
          test -f logs/production_distributed_ready_final.log
