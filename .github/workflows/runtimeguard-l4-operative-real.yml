name: RuntimeGuard L4 Operative Real

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  runtimeguard-l4-operative-real:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run operative RuntimeGuard check
        run: python3 tools/checks/check_runtimeguard_l4_operative.py

      - name: Require generated runtimeguard artifacts
        run: |
          test -f artifacts/cases/case_003/runtimeguard_l4_decision.case_003.json
          test -f artifacts/cases/case_003/runtimeguard_l4_block_record.case_003.json
          test -f reports/operative_checks/runtimeguard_l4_operative_check.json
          test -f logs/runtimeguard_l4_operative.log
