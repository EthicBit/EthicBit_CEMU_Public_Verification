name: AEM-EVOLVE Reproduction

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  reproduce:
    name: Full-Stack Verification (v1.6)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install cryptography mlkem asyncpg fastapi langgraph starlette httpx

      - name: Run v1.3 full-stack verifier
        run: |
          python3 demos/aem-evolve-multi-agent-api/tools/reproduction/verify_all_v1_3.py

      - name: Run v1.4 full-stack verifier
        run: |
          python3 demos/aem-evolve-multi-agent-api/tools/reproduction/verify_all_v1_4.py

      - name: Run v1.5 full-stack verifier
        run: |
          python3 demos/aem-evolve-multi-agent-api/tools/reproduction/verify_all_v1_5.py

      - name: Run v1.6 full-stack verifier
        run: |
          python3 demos/aem-evolve-multi-agent-api/tools/reproduction/verify_all_v1_6.py

      - name: Run E2E integration test
        run: |
          python3 demos/aem-evolve-multi-agent-api/tools/integration/e2e_api_test.py

      - name: Upload reproduction reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reproduction-reports
          path: |
            assurance/evolve-multi-agent/v1_3/REPRODUCTION_REPORT.json
            assurance/evolve-multi-agent/v1_4/REPRODUCTION_REPORT.json
            assurance/evolve-multi-agent/v1_5/REPRODUCTION_REPORT.json
            assurance/evolve-multi-agent/v1_6/REPRODUCTION_REPORT.json
