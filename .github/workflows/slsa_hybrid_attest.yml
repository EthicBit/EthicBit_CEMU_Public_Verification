name: slsa-hybrid-attest

on:
  workflow_dispatch:
  push:
    branches: [ "master" ]
    tags:
      - "v*"
      - "audit-freeze-*"

permissions:
  contents: read
  id-token: write
  attestations: write

env:
  PYTHON_VERSION: "3.11"

jobs:
  build-sign-attest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Show tool versions
        run: |
          python3 --version
          openssl version
          node --version || true
          npm --version || true

      - name: Prepare directories
        run: |
          mkdir -p provenance
          mkdir -p artifacts/ci
          mkdir -p attestation
          mkdir -p assurance/keys

      - name: Prepare hybrid signing keys (secrets + compatibility fallback)
        shell: bash
        run: |
          set -euo pipefail
          key_provenance_mode="trusted_secrets_keys"
          mldsa_mode="native_hybrid"

          if [[ -n "${{ secrets.ETHICBIT_ED25519_PRIVATE_KEY_PEM }}" && -n "${{ secrets.ETHICBIT_ED25519_PUBLIC_KEY_PEM }}" ]]; then
            printf '%s' "${{ secrets.ETHICBIT_ED25519_PRIVATE_KEY_PEM }}" > assurance/keys/ed25519_private.pem
            printf '%s' "${{ secrets.ETHICBIT_ED25519_PUBLIC_KEY_PEM }}" > assurance/keys/ed25519_public.pem
          else
            key_provenance_mode="ephemeral_runner_keys"
            openssl genpkey -algorithm Ed25519 -out assurance/keys/ed25519_private.pem
            openssl pkey -in assurance/keys/ed25519_private.pem -pubout -out assurance/keys/ed25519_public.pem
          fi

          if [[ -n "${{ secrets.ETHICBIT_MLDSA_PRIVATE_KEY_PEM }}" && -n "${{ secrets.ETHICBIT_MLDSA_PUBLIC_KEY_PEM }}" ]]; then
            printf '%s' "${{ secrets.ETHICBIT_MLDSA_PRIVATE_KEY_PEM }}" > assurance/keys/mldsa_private.pem
            printf '%s' "${{ secrets.ETHICBIT_MLDSA_PUBLIC_KEY_PEM }}" > assurance/keys/mldsa_public.pem
          else
            key_provenance_mode="ephemeral_runner_keys"
            openssl genpkey -algorithm Ed25519 -out assurance/keys/mldsa_private.pem
            openssl pkey -in assurance/keys/mldsa_private.pem -pubout -out assurance/keys/mldsa_public.pem
          fi

          for key_file in assurance/keys/ed25519_private.pem assurance/keys/ed25519_public.pem assurance/keys/mldsa_private.pem assurance/keys/mldsa_public.pem; do
            if [[ ! -s "${key_file}" ]]; then
              echo "Missing signing key material: ${key_file}" >&2
              exit 1
            fi
          done

          printf '{"artifactType":"ci_key_probe"}' >/tmp/ci_key_probe.json
          openssl pkeyutl -sign -inkey assurance/keys/ed25519_private.pem -rawin -in /tmp/ci_key_probe.json -out /tmp/ci_key_probe.ed.sig

          # Some GitHub runners do not support ML-DSA keys in OpenSSL.
          # Fallback to a CI-compatible keypair so fail-closed controls remain executable.
          if ! openssl pkeyutl -sign -inkey assurance/keys/mldsa_private.pem -rawin -in /tmp/ci_key_probe.json -out /tmp/ci_key_probe.mldsa.sig >/tmp/ci_key_probe.mldsa.err 2>&1; then
            echo "ML-DSA key unsupported on runner; enabling CI compatibility fallback."
            mldsa_mode="compatibility_fallback"
            key_provenance_mode="ephemeral_runner_keys"
            openssl genpkey -algorithm Ed25519 -out assurance/keys/mldsa_private.pem
            openssl pkey -in assurance/keys/mldsa_private.pem -pubout -out assurance/keys/mldsa_public.pem
            openssl pkeyutl -sign -inkey assurance/keys/mldsa_private.pem -rawin -in /tmp/ci_key_probe.json -out /tmp/ci_key_probe.mldsa.sig
          fi

          if [[ "${key_provenance_mode}" == "trusted_secrets_keys" && "${mldsa_mode}" == "native_hybrid" ]]; then
            crypto_claim_tier="strict_trusted_hybrid"
          else
            crypto_claim_tier="compatibility_hybrid"
          fi

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            audit_require_hybrid="1"
          else
            audit_require_hybrid="0"
          fi

          release_class="branch_ci"
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == audit-freeze-* ]]; then
            release_class="audit_freeze_tag"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == v* ]]; then
            release_class="release_tag"
          fi

          {
            echo "ETHICBIT_KEY_PROVENANCE_MODE=${key_provenance_mode}"
            echo "ETHICBIT_MLDSA_MODE=${mldsa_mode}"
            echo "ETHICBIT_CRYPTO_MODE_EFFECTIVE=${mldsa_mode}"
            echo "ETHICBIT_CRYPTO_CLAIM_TIER=${crypto_claim_tier}"
            echo "ETHICBIT_AUDIT_REQUIRE_HYBRID=${audit_require_hybrid}"
            echo "ETHICBIT_RELEASE_CLASS=${release_class}"
          } >> "$GITHUB_ENV"

          chmod 600 assurance/keys/*.pem

      - name: Export signing environment
        shell: bash
        run: |
          {
            echo "ETHICBIT_ED25519_SIGN_CMD=${{ github.workspace }}/assurance/signers/ed25519_sign.sh {payload}"
            echo "ETHICBIT_MLDSA_SIGN_CMD=${{ github.workspace }}/assurance/signers/mldsa_sign.sh {payload}"
            echo "ETHICBIT_ED25519_VERIFY_CMD=${{ github.workspace }}/assurance/signers/ed25519_verify.sh {payload} {signature}"
            echo "ETHICBIT_MLDSA_VERIFY_CMD=${{ github.workspace }}/assurance/signers/mldsa_verify.sh {payload} {signature}"
            echo "ETHICBIT_ED25519_KEY_ID=ETHICBIT_ED25519_CI_V1"
            echo "ETHICBIT_MLDSA_KEY_ID=ETHICBIT_MLDSA65_CI_V1"
            echo "ETHICBIT_ED25519_PRIVATE_KEY=${{ github.workspace }}/assurance/keys/ed25519_private.pem"
            echo "ETHICBIT_ED25519_PUBLIC_KEY=${{ github.workspace }}/assurance/keys/ed25519_public.pem"
            echo "ETHICBIT_MLDSA_PRIVATE_KEY=${{ github.workspace }}/assurance/keys/mldsa_private.pem"
            echo "ETHICBIT_MLDSA_PUBLIC_KEY=${{ github.workspace }}/assurance/keys/mldsa_public.pem"
          } >> "$GITHUB_ENV"

      - name: Diagnose signing environment
        shell: bash
        run: |
          set -e
          echo "===== OPENSSL ====="
          which openssl
          openssl version
          openssl list -public-key-algorithms | grep -i 'ML-DSA\|MLDSA' || true

          echo
          echo "===== KEY FILES ====="
          ls -l assurance/keys || true
          wc -c assurance/keys/ed25519_private.pem assurance/keys/ed25519_public.pem assurance/keys/mldsa_private.pem assurance/keys/mldsa_public.pem || true

          echo
          echo "===== TEST PAYLOAD ====="
          python3 - <<'PY'
          import json
          from pathlib import Path
          from scripts.crypto.jcs_rfc8785 import canonicalize_bytes

          payload = {
            "artifactType": "ci_sign_test",
            "buildId": "github-actions",
            "claim": "ETHICBIT_CI_SIGN_TEST"
          }
          Path("/tmp/ci_test_payload.jcs.json").write_bytes(canonicalize_bytes(payload))
          print("wrote test payload")
          PY

          echo
          echo "===== DIRECT ED25519 ====="
          bash assurance/signers/ed25519_sign.sh /tmp/ci_test_payload.jcs.json | head -c 120 ; echo

          echo
          echo "===== DIRECT ML-DSA ====="
          if bash assurance/signers/mldsa_sign.sh /tmp/ci_test_payload.jcs.json > /tmp/mldsa_ci_test.sig 2>/tmp/mldsa_ci_test.err; then
            head -c 120 /tmp/mldsa_ci_test.sig ; echo
            echo "MLDSA_CI=PASS"
          else
            cat /tmp/mldsa_ci_test.err || true
            echo "MLDSA_CI=UNSUPPORTED_ON_RUNNER"
          fi

      - name: Run constitutional fail-closed release gate
        shell: bash
        run: |
          chmod +x scripts/audit/verify_constitutional_controls.sh
          ./scripts/audit/verify_constitutional_controls.sh

      - name: Hybrid-sign provenance payload
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path
          from scripts.crypto.jcs_rfc8785 import canonicalize_bytes

          payload = {
            "artifactType": "ethicbit_ci_attestation_payload",
            "repository": "${{ github.repository }}",
            "ref": "${{ github.ref }}",
            "sha": "${{ github.sha }}",
            "run_id": "${{ github.run_id }}",
            "crypto_mode_effective": os.environ.get("ETHICBIT_CRYPTO_MODE_EFFECTIVE", "unknown"),
            "mldsa_mode": os.environ.get("ETHICBIT_MLDSA_MODE", "unknown"),
            "key_provenance_mode": os.environ.get("ETHICBIT_KEY_PROVENANCE_MODE", "unknown"),
            "crypto_claim_tier": os.environ.get("ETHICBIT_CRYPTO_CLAIM_TIER", "unspecified"),
            "audit_require_hybrid": os.environ.get("ETHICBIT_AUDIT_REQUIRE_HYBRID", "0"),
            "release_class": os.environ.get("ETHICBIT_RELEASE_CLASS", "branch_ci")
          }
          Path("provenance/payload.json").write_text(
            json.dumps(payload, indent=2, ensure_ascii=False) + "\n",
            encoding="utf-8"
          )
          Path("provenance/payload.jcs.json").write_bytes(canonicalize_bytes(payload))
          PY

          python3 scripts/crypto/hybrid_sign.py \
            provenance/payload.json \
            --output attestation/hybrid_signature_set.json \
            --risk-mode STANDARD \
            --ed25519-sign-cmd "$ETHICBIT_ED25519_SIGN_CMD" \
            --mldsa-sign-cmd "$ETHICBIT_MLDSA_SIGN_CMD" \
            --ed25519-key-id "$ETHICBIT_ED25519_KEY_ID" \
            --mldsa-key-id "$ETHICBIT_MLDSA_KEY_ID"

      - name: Verify hybrid signatures
        run: |
          python3 scripts/crypto/hybrid_verify.py \
            --payload provenance/payload.jcs.json \
            --signature-set attestation/hybrid_signature_set.json \
            --risk-mode STANDARD \
            --ed25519-verify-cmd "$ETHICBIT_ED25519_VERIFY_CMD" \
            --mldsa-verify-cmd "$ETHICBIT_MLDSA_VERIFY_CMD"

      - name: Run full audit
        run: |
          chmod +x ./audit.sh
          echo "ETHICBIT_AUDIT_REQUIRE_HYBRID=${ETHICBIT_AUDIT_REQUIRE_HYBRID}"
          echo "ETHICBIT_CRYPTO_MODE_EFFECTIVE=${ETHICBIT_CRYPTO_MODE_EFFECTIVE}"
          echo "ETHICBIT_KEY_PROVENANCE_MODE=${ETHICBIT_KEY_PROVENANCE_MODE}"
          echo "ETHICBIT_MLDSA_MODE=${ETHICBIT_MLDSA_MODE}"
          echo "ETHICBIT_CRYPTO_CLAIM_TIER=${ETHICBIT_CRYPTO_CLAIM_TIER}"
          ETHICBIT_AUDIT_RISK_MODE=STANDARD \
          ETHICBIT_AUDIT_REQUIRE_HYBRID="${ETHICBIT_AUDIT_REQUIRE_HYBRID}" \
          ./audit.sh

      - name: Upload GitHub provenance attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            provenance/payload.jcs.json
            attestation/hybrid_signature_set.json

      - name: Upload CI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ethicbit-slsa-hybrid-attestation-${{ github.run_id }}
          path: |
            provenance/payload.json
            provenance/payload.jcs.json
            attestation/hybrid_signature_set.json
            artifacts/history/swarm/official_operational_status.json
            results/GATE_REPORT.json
            results/constitutional_controls_report.json
            artifacts/history/swarm/triple_public_anchor_live_verification.json
