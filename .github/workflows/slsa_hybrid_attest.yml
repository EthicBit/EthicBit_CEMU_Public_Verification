      - name: Diagnose signing environment
        shell: bash
        run: |
          set -e
          echo "===== OPENSSL ====="
          which openssl
          openssl version
          openssl list -public-key-algorithms | grep -i 'ML-DSA\|MLDSA' || true

          echo
          echo "===== KEY FILES ====="
          ls -l assurance/keys || true
          wc -c assurance/keys/ed25519_private.pem assurance/keys/ed25519_public.pem assurance/keys/mldsa_private.pem assurance/keys/mldsa_public.pem || true

          echo
          echo "===== TEST PAYLOAD ====="
          python3 - <<'PY'
          import json
          from pathlib import Path
          from scripts.crypto.jcs_rfc8785 import canonicalize_bytes

          payload = {
            "artifactType": "ci_sign_test",
            "buildId": "github-actions",
            "claim": "ETHICBIT_CI_SIGN_TEST"
          }
          Path("/tmp/ci_test_payload.jcs.json").write_bytes(canonicalize_bytes(payload))
          print("wrote test payload")
          PY

          echo
          echo "===== DIRECT ED25519 ====="
          bash assurance/signers/ed25519_sign.sh /tmp/ci_test_payload.jcs.json | head -c 120 ; echo

          echo
          echo "===== DIRECT ML-DSA ====="
          bash assurance/signers/mldsa_sign.sh /tmp/ci_test_payload.jcs.json | head -c 120 ; echo
