name: slsa-hybrid-attest

on:
  workflow_dispatch:
  push:
    branches: [ "master" ]
    tags:
      - "v*"
      - "audit-freeze-*"

permissions:
  contents: read
  id-token: write
  attestations: write

env:
  PYTHON_VERSION: "3.11"

jobs:
  build-sign-attest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Show tool versions
        run: |
          python3 --version
          openssl version
          node --version || true
          npm --version || true

      - name: Prepare directories
        run: |
          mkdir -p provenance
          mkdir -p artifacts/ci
          mkdir -p attestation
          mkdir -p assurance/keys

      - name: Prepare hybrid signing keys (secrets + compatibility fallback)
        shell: bash
        run: |
          set -euo pipefail
          ed25519_key_source="trusted_secrets"
          mldsa_key_source="trusted_secrets"
          mldsa_effective_mode="native_mldsa"
          runner_supports_mldsa="true"

          if [[ -n "${{ secrets.ETHICBIT_ED25519_PRIVATE_KEY_PEM }}" && -n "${{ secrets.ETHICBIT_ED25519_PUBLIC_KEY_PEM }}" ]]; then
            printf '%s' "${{ secrets.ETHICBIT_ED25519_PRIVATE_KEY_PEM }}" > assurance/keys/ed25519_private.pem
            printf '%s' "${{ secrets.ETHICBIT_ED25519_PUBLIC_KEY_PEM }}" > assurance/keys/ed25519_public.pem
          else
            ed25519_key_source="ephemeral_runner"
            openssl genpkey -algorithm Ed25519 -out assurance/keys/ed25519_private.pem
            openssl pkey -in assurance/keys/ed25519_private.pem -pubout -out assurance/keys/ed25519_public.pem
          fi

          if [[ -n "${{ secrets.ETHICBIT_MLDSA_PRIVATE_KEY_PEM }}" && -n "${{ secrets.ETHICBIT_MLDSA_PUBLIC_KEY_PEM }}" ]]; then
            printf '%s' "${{ secrets.ETHICBIT_MLDSA_PRIVATE_KEY_PEM }}" > assurance/keys/mldsa_private.pem
            printf '%s' "${{ secrets.ETHICBIT_MLDSA_PUBLIC_KEY_PEM }}" > assurance/keys/mldsa_public.pem
          else
            mldsa_key_source="ephemeral_runner"
            mldsa_effective_mode="compatibility_fallback"
            runner_supports_mldsa="false"
            openssl genpkey -algorithm Ed25519 -out assurance/keys/mldsa_private.pem
            openssl pkey -in assurance/keys/mldsa_private.pem -pubout -out assurance/keys/mldsa_public.pem
          fi

          for key_file in assurance/keys/ed25519_private.pem assurance/keys/ed25519_public.pem assurance/keys/mldsa_private.pem assurance/keys/mldsa_public.pem; do
            if [[ ! -s "${key_file}" ]]; then
              echo "Missing signing key material: ${key_file}" >&2
              exit 1
            fi
          done

          printf '{"artifactType":"ci_key_probe"}' >/tmp/ci_key_probe.json
          openssl pkeyutl -sign -inkey assurance/keys/ed25519_private.pem -rawin -in /tmp/ci_key_probe.json -out /tmp/ci_key_probe.ed.sig

          # Some GitHub runners do not support ML-DSA keys in OpenSSL.
          # Fallback to a CI-compatible keypair so fail-closed controls remain executable.
          if ! openssl pkeyutl -sign -inkey assurance/keys/mldsa_private.pem -rawin -in /tmp/ci_key_probe.json -out /tmp/ci_key_probe.mldsa.sig >/tmp/ci_key_probe.mldsa.err 2>&1; then
            echo "ML-DSA key unsupported on runner; enabling CI compatibility fallback."
            mldsa_effective_mode="compatibility_fallback"
            mldsa_key_source="ephemeral_runner"
            runner_supports_mldsa="false"
            openssl genpkey -algorithm Ed25519 -out assurance/keys/mldsa_private.pem
            openssl pkey -in assurance/keys/mldsa_private.pem -pubout -out assurance/keys/mldsa_public.pem
            openssl pkeyutl -sign -inkey assurance/keys/mldsa_private.pem -rawin -in /tmp/ci_key_probe.json -out /tmp/ci_key_probe.mldsa.sig
          fi

          if [[ "${mldsa_effective_mode}" == "native_mldsa" ]]; then
            crypto_mode_effective="native_hybrid"
          else
            crypto_mode_effective="compatibility_fallback"
          fi

          if [[ "${ed25519_key_source}" == "trusted_secrets" && "${mldsa_key_source}" == "trusted_secrets" && "${mldsa_effective_mode}" == "native_mldsa" ]]; then
            hybrid_claim_mode="native_hybrid"
            crypto_claim_tier="strict_trusted_hybrid"
            key_provenance_mode="fully_trusted_native"
          else
            hybrid_claim_mode="compatibility_hybrid"
            if [[ "${ed25519_key_source}" == "trusted_secrets" && "${mldsa_key_source}" == "ephemeral_runner" && "${mldsa_effective_mode}" == "compatibility_fallback" ]]; then
              key_provenance_mode="trusted_plus_compatibility_fallback"
              crypto_claim_tier="compatibility_hybrid_trusted_anchor"
            elif [[ "${ed25519_key_source}" == "trusted_secrets" && "${mldsa_key_source}" == "ephemeral_runner" ]]; then
              key_provenance_mode="trusted_plus_ephemeral_mldsa"
              crypto_claim_tier="compatibility_hybrid_mixed"
            elif [[ "${ed25519_key_source}" == "ephemeral_runner" && "${mldsa_key_source}" == "trusted_secrets" ]]; then
              key_provenance_mode="ephemeral_ed25519_plus_trusted_mldsa"
              crypto_claim_tier="compatibility_hybrid_mixed"
            elif [[ "${ed25519_key_source}" == "ephemeral_runner" && "${mldsa_key_source}" == "ephemeral_runner" ]]; then
              key_provenance_mode="fully_ephemeral"
              crypto_claim_tier="compatibility_hybrid_ephemeral"
            else
              key_provenance_mode="mixed_provenance"
              crypto_claim_tier="compatibility_hybrid_mixed"
            fi
          fi

          if [[ "${ed25519_key_source}" == "trusted_secrets" ]]; then
            ed25519_key_id="ETHICBIT_ED25519_CI_SECRET_V1"
          else
            ed25519_key_id="ETHICBIT_ED25519_CI_EPHEMERAL_V1"
          fi

          if [[ "${mldsa_effective_mode}" == "native_mldsa" ]]; then
            if [[ "${mldsa_key_source}" == "trusted_secrets" ]]; then
              mldsa_key_id="ETHICBIT_MLDSA65_CI_SECRET_V1"
            else
              mldsa_key_id="ETHICBIT_MLDSA65_CI_EPHEMERAL_V1"
            fi
          else
            mldsa_key_id="ETHICBIT_MLDSA_COMPAT_ED25519_CI_V1"
          fi

          if [[ "${ed25519_key_source}" == "ephemeral_runner" || "${mldsa_key_source}" == "ephemeral_runner" ]]; then
            ephemeral_keys_used="true"
          else
            ephemeral_keys_used="false"
          fi

          if [[ "${hybrid_claim_mode}" == "native_hybrid" && "${ephemeral_keys_used}" == "false" && "${runner_supports_mldsa}" == "true" ]]; then
            eligible_for_sovereign_release="true"
          else
            eligible_for_sovereign_release="false"
          fi

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            audit_require_hybrid="1"
          else
            audit_require_hybrid="0"
          fi

          release_class="branch_ci"
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == audit-freeze-* ]]; then
            release_class="audit_freeze_tag"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == v* ]]; then
            release_class="release_tag"
          fi

          claim_level="ci_grade"
          require_native_hybrid="0"
          if [[ "${release_class}" == "audit_freeze_tag" ]]; then
            claim_level="freeze_grade"
            require_native_hybrid="1"
          elif [[ "${release_class}" == "release_tag" ]]; then
            claim_level="sovereign_release"
            require_native_hybrid="1"
          fi

          {
            echo "ETHICBIT_KEY_PROVENANCE_MODE=${key_provenance_mode}"
            echo "ETHICBIT_ED25519_KEY_SOURCE=${ed25519_key_source}"
            echo "ETHICBIT_MLDSA_KEY_SOURCE=${mldsa_key_source}"
            echo "ETHICBIT_MLDSA_MODE=${mldsa_effective_mode}"
            echo "ETHICBIT_MLDSA_EFFECTIVE_MODE=${mldsa_effective_mode}"
            echo "ETHICBIT_CRYPTO_MODE_EFFECTIVE=${crypto_mode_effective}"
            echo "ETHICBIT_HYBRID_CLAIM_MODE=${hybrid_claim_mode}"
            echo "ETHICBIT_CRYPTO_CLAIM_TIER=${crypto_claim_tier}"
            echo "ETHICBIT_ED25519_KEY_ID=${ed25519_key_id}"
            echo "ETHICBIT_MLDSA_KEY_ID=${mldsa_key_id}"
            echo "ETHICBIT_RUNNER_SUPPORTS_MLDSA=${runner_supports_mldsa}"
            echo "ETHICBIT_EPHEMERAL_KEYS_USED=${ephemeral_keys_used}"
            echo "ETHICBIT_ELIGIBLE_FOR_SOVEREIGN_RELEASE=${eligible_for_sovereign_release}"
            echo "ETHICBIT_AUDIT_REQUIRE_HYBRID=${audit_require_hybrid}"
            echo "ETHICBIT_CLAIM_LEVEL=${claim_level}"
            echo "ETHICBIT_REQUIRE_NATIVE_HYBRID=${require_native_hybrid}"
            echo "ETHICBIT_RELEASE_CLASS=${release_class}"
          } >> "$GITHUB_ENV"

          chmod 600 assurance/keys/*.pem

      - name: Export signing environment
        shell: bash
        run: |
          {
            echo "ETHICBIT_ED25519_SIGN_CMD=${{ github.workspace }}/assurance/signers/ed25519_sign.sh {payload}"
            echo "ETHICBIT_MLDSA_SIGN_CMD=${{ github.workspace }}/assurance/signers/mldsa_sign.sh {payload}"
            echo "ETHICBIT_ED25519_VERIFY_CMD=${{ github.workspace }}/assurance/signers/ed25519_verify.sh {payload} {signature}"
            echo "ETHICBIT_MLDSA_VERIFY_CMD=${{ github.workspace }}/assurance/signers/mldsa_verify.sh {payload} {signature}"
            echo "ETHICBIT_ED25519_PRIVATE_KEY=${{ github.workspace }}/assurance/keys/ed25519_private.pem"
            echo "ETHICBIT_ED25519_PUBLIC_KEY=${{ github.workspace }}/assurance/keys/ed25519_public.pem"
            echo "ETHICBIT_MLDSA_PRIVATE_KEY=${{ github.workspace }}/assurance/keys/mldsa_private.pem"
            echo "ETHICBIT_MLDSA_PUBLIC_KEY=${{ github.workspace }}/assurance/keys/mldsa_public.pem"
          } >> "$GITHUB_ENV"

      - name: Write signing mode artifacts
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          report = {
            "artifactType": "signing_environment_report",
            "repository": os.environ.get("GITHUB_REPOSITORY", ""),
            "ref": os.environ.get("GITHUB_REF", ""),
            "sha": os.environ.get("GITHUB_SHA", ""),
            "run_id": os.environ.get("GITHUB_RUN_ID", ""),
            "ed25519_key_source": os.environ.get("ETHICBIT_ED25519_KEY_SOURCE", "unknown"),
            "mldsa_key_source": os.environ.get("ETHICBIT_MLDSA_KEY_SOURCE", "unknown"),
            "mldsa_effective_mode": os.environ.get("ETHICBIT_MLDSA_EFFECTIVE_MODE", "unknown"),
            "hybrid_claim_mode": os.environ.get("ETHICBIT_HYBRID_CLAIM_MODE", "unknown"),
            "ed25519_key_id": os.environ.get("ETHICBIT_ED25519_KEY_ID", "unknown"),
            "mldsa_key_id": os.environ.get("ETHICBIT_MLDSA_KEY_ID", "unknown"),
            "audit_require_hybrid": os.environ.get("ETHICBIT_AUDIT_REQUIRE_HYBRID", "0"),
            "claim_level": os.environ.get("ETHICBIT_CLAIM_LEVEL", "ci_grade"),
            "require_native_hybrid": os.environ.get("ETHICBIT_REQUIRE_NATIVE_HYBRID", "0"),
            "release_class": os.environ.get("ETHICBIT_RELEASE_CLASS", "branch_ci"),
          }

          effective = {
            "artifactType": "hybrid_mode_effective",
            "crypto_mode_effective": os.environ.get("ETHICBIT_CRYPTO_MODE_EFFECTIVE", "unknown"),
            "ed25519_key_source": os.environ.get("ETHICBIT_ED25519_KEY_SOURCE", "unknown"),
            "mldsa_key_source": os.environ.get("ETHICBIT_MLDSA_KEY_SOURCE", "unknown"),
            "mldsa_effective_mode": os.environ.get("ETHICBIT_MLDSA_EFFECTIVE_MODE", "unknown"),
            "hybrid_claim_mode": os.environ.get("ETHICBIT_HYBRID_CLAIM_MODE", "unknown"),
            "key_provenance_mode": os.environ.get("ETHICBIT_KEY_PROVENANCE_MODE", "unknown"),
            "claim_tier": os.environ.get("ETHICBIT_CRYPTO_CLAIM_TIER", "unspecified"),
          }

          truth = {
            "artifactType": "hybrid_crypto_truth",
            "ed25519_key_source": os.environ.get("ETHICBIT_ED25519_KEY_SOURCE", "unknown"),
            "mldsa_key_source": os.environ.get("ETHICBIT_MLDSA_KEY_SOURCE", "unknown"),
            "mldsa_effective_mode": os.environ.get("ETHICBIT_MLDSA_EFFECTIVE_MODE", "unknown"),
            "hybrid_claim_mode": os.environ.get("ETHICBIT_HYBRID_CLAIM_MODE", "unknown"),
            "key_provenance_mode": os.environ.get("ETHICBIT_KEY_PROVENANCE_MODE", "unknown"),
            "crypto_claim_tier": os.environ.get("ETHICBIT_CRYPTO_CLAIM_TIER", "unspecified"),
            "release_class": os.environ.get("ETHICBIT_RELEASE_CLASS", "branch_ci"),
            "ephemeral_keys_used": os.environ.get("ETHICBIT_EPHEMERAL_KEYS_USED", "true").lower() == "true",
            "runner_supports_mldsa": os.environ.get("ETHICBIT_RUNNER_SUPPORTS_MLDSA", "false").lower() == "true",
            "claim_level": os.environ.get("ETHICBIT_CLAIM_LEVEL", "ci_grade"),
            "require_native_hybrid": os.environ.get("ETHICBIT_REQUIRE_NATIVE_HYBRID", "0").lower() in {"1", "true", "yes"},
            "eligible_for_sovereign_release": os.environ.get("ETHICBIT_ELIGIBLE_FOR_SOVEREIGN_RELEASE", "false").lower() == "true",
          }

          Path("artifacts/ci/signing_environment_report.json").write_text(
              json.dumps(report, indent=2, ensure_ascii=False) + "\n",
              encoding="utf-8",
          )
          Path("artifacts/ci/hybrid_mode_effective.json").write_text(
              json.dumps(effective, indent=2, ensure_ascii=False) + "\n",
              encoding="utf-8",
          )
          Path("artifacts/ci/hybrid_crypto_truth.json").write_text(
              json.dumps(truth, indent=2, ensure_ascii=False) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Diagnose signing environment
        shell: bash
        run: |
          set -e
          echo "===== OPENSSL ====="
          which openssl
          openssl version
          openssl list -public-key-algorithms | grep -i 'ML-DSA\|MLDSA' || true

          echo
          echo "===== KEY FILES ====="
          ls -l assurance/keys || true
          wc -c assurance/keys/ed25519_private.pem assurance/keys/ed25519_public.pem assurance/keys/mldsa_private.pem assurance/keys/mldsa_public.pem || true

          echo
          echo "===== TEST PAYLOAD ====="
          python3 - <<'PY'
          import json
          from pathlib import Path
          from scripts.crypto.jcs_rfc8785 import canonicalize_bytes

          payload = {
            "artifactType": "ci_sign_test",
            "buildId": "github-actions",
            "claim": "ETHICBIT_CI_SIGN_TEST"
          }
          Path("/tmp/ci_test_payload.jcs.json").write_bytes(canonicalize_bytes(payload))
          print("wrote test payload")
          PY

          echo
          echo "===== DIRECT ED25519 ====="
          bash assurance/signers/ed25519_sign.sh /tmp/ci_test_payload.jcs.json | head -c 120 ; echo

          echo
          echo "===== DIRECT ML-DSA ====="
          if bash assurance/signers/mldsa_sign.sh /tmp/ci_test_payload.jcs.json > /tmp/mldsa_ci_test.sig 2>/tmp/mldsa_ci_test.err; then
            head -c 120 /tmp/mldsa_ci_test.sig ; echo
            echo "MLDSA_CI=PASS"
          else
            cat /tmp/mldsa_ci_test.err || true
            echo "MLDSA_CI=UNSUPPORTED_ON_RUNNER"
          fi

      - name: Run constitutional fail-closed release gate
        shell: bash
        run: |
          chmod +x scripts/audit/verify_constitutional_controls.sh
          ./scripts/audit/verify_constitutional_controls.sh

      - name: Enforce crypto claim policy
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import sys
          from pathlib import Path

          truth_path = Path("artifacts/ci/hybrid_crypto_truth.json")
          if not truth_path.exists():
              print(f"Policy violation: missing truth artifact {truth_path}", file=sys.stderr)
              raise SystemExit(1)

          truth = json.loads(truth_path.read_text(encoding="utf-8"))

          def as_bool_from_env(name: str, default: bool) -> bool:
              raw = os.environ.get(name)
              if raw is None:
                  return default
              return raw.strip().lower() in {"1", "true", "yes", "y", "on"}

          env_view = {
              "claim_level": os.environ.get("ETHICBIT_CLAIM_LEVEL", "ci_grade"),
              "require_native_hybrid": as_bool_from_env("ETHICBIT_REQUIRE_NATIVE_HYBRID", False),
              "hybrid_claim_mode": os.environ.get("ETHICBIT_HYBRID_CLAIM_MODE", "unknown"),
              "mldsa_effective_mode": os.environ.get("ETHICBIT_MLDSA_EFFECTIVE_MODE", "unknown"),
              "ed25519_key_source": os.environ.get("ETHICBIT_ED25519_KEY_SOURCE", "unknown"),
              "mldsa_key_source": os.environ.get("ETHICBIT_MLDSA_KEY_SOURCE", "unknown"),
              "ephemeral_keys_used": as_bool_from_env("ETHICBIT_EPHEMERAL_KEYS_USED", True),
              "runner_supports_mldsa": as_bool_from_env("ETHICBIT_RUNNER_SUPPORTS_MLDSA", False),
              "eligible_for_sovereign_release": as_bool_from_env("ETHICBIT_ELIGIBLE_FOR_SOVEREIGN_RELEASE", False),
              "key_provenance_mode": os.environ.get("ETHICBIT_KEY_PROVENANCE_MODE", "unknown"),
              "crypto_claim_tier": os.environ.get("ETHICBIT_CRYPTO_CLAIM_TIER", "unspecified"),
              "release_class": os.environ.get("ETHICBIT_RELEASE_CLASS", "branch_ci"),
          }

          compare_keys = [
              "claim_level",
              "require_native_hybrid",
              "hybrid_claim_mode",
              "mldsa_effective_mode",
              "ed25519_key_source",
              "mldsa_key_source",
              "ephemeral_keys_used",
              "runner_supports_mldsa",
              "eligible_for_sovereign_release",
              "key_provenance_mode",
              "crypto_claim_tier",
              "release_class",
          ]

          mismatches = []
          for key in compare_keys:
              if truth.get(key) != env_view[key]:
                  mismatches.append((key, truth.get(key), env_view[key]))

          if mismatches:
              print("Policy violation: hybrid_crypto_truth.json is out of sync with environment.", file=sys.stderr)
              for key, truth_value, env_value in mismatches:
                  print(
                      f"  - {key}: truth={truth_value!r} env={env_value!r}",
                      file=sys.stderr,
                  )
              raise SystemExit(1)

          claim_level = str(truth.get("claim_level", "ci_grade"))
          require_native_hybrid = bool(truth.get("require_native_hybrid", False))
          hybrid_claim_mode = str(truth.get("hybrid_claim_mode", "unknown"))
          mldsa_effective_mode = str(truth.get("mldsa_effective_mode", "unknown"))
          ed25519_key_source = str(truth.get("ed25519_key_source", "unknown"))
          mldsa_key_source = str(truth.get("mldsa_key_source", "unknown"))
          ephemeral_keys_used = bool(truth.get("ephemeral_keys_used", True))
          runner_supports_mldsa = bool(truth.get("runner_supports_mldsa", False))
          eligible_for_sovereign_release = bool(truth.get("eligible_for_sovereign_release", False))

          print(
              "POLICY_CONTEXT:",
              {
                  "claim_level": claim_level,
                  "require_native_hybrid": require_native_hybrid,
                  "hybrid_claim_mode": hybrid_claim_mode,
                  "mldsa_effective_mode": mldsa_effective_mode,
                  "ed25519_key_source": ed25519_key_source,
                  "mldsa_key_source": mldsa_key_source,
                  "ephemeral_keys_used": ephemeral_keys_used,
                  "runner_supports_mldsa": runner_supports_mldsa,
                  "eligible_for_sovereign_release": eligible_for_sovereign_release,
              },
          )

          # Base consistency checks for effective crypto truth
          if (
              ephemeral_keys_used
              and ed25519_key_source == "trusted_secrets"
              and mldsa_key_source == "trusted_secrets"
          ):
              print(
                  "Policy violation: ephemeral_keys_used=true but both key sources are trusted_secrets.",
                  file=sys.stderr,
              )
              raise SystemExit(1)
          if (
              not ephemeral_keys_used
              and (ed25519_key_source == "ephemeral_runner" or mldsa_key_source == "ephemeral_runner")
          ):
              print(
                  "Policy violation: ephemeral_keys_used=false but an ephemeral key source is declared.",
                  file=sys.stderr,
              )
              raise SystemExit(1)

          # Native-hybrid requirement enforcement
          if require_native_hybrid:
              if hybrid_claim_mode != "native_hybrid":
                  print(
                      f"Policy violation: require_native_hybrid=true but hybrid_claim_mode={hybrid_claim_mode}.",
                      file=sys.stderr,
                  )
                  raise SystemExit(1)
              if mldsa_effective_mode != "native_mldsa":
                  print(
                      f"Policy violation: require_native_hybrid=true but mldsa_effective_mode={mldsa_effective_mode}.",
                      file=sys.stderr,
                  )
                  raise SystemExit(1)

          # Freeze/release-grade enforcement
          if claim_level in {"freeze_grade", "sovereign_release"}:
              if ed25519_key_source != "trusted_secrets" or mldsa_key_source != "trusted_secrets":
                  print(
                      f"Policy violation: {claim_level} requires trusted_secrets on both channels.",
                      file=sys.stderr,
                  )
                  raise SystemExit(1)
              if ephemeral_keys_used:
                  print(
                      f"Policy violation: {claim_level} does not allow ephemeral keys.",
                      file=sys.stderr,
                  )
                  raise SystemExit(1)
              if hybrid_claim_mode != "native_hybrid" or mldsa_effective_mode != "native_mldsa":
                  print(
                      f"Policy violation: {claim_level} requires native hybrid mode.",
                      file=sys.stderr,
                  )
                  raise SystemExit(1)
              if not runner_supports_mldsa:
                  print(
                      f"Policy violation: {claim_level} requires ML-DSA support on runner.",
                      file=sys.stderr,
                  )
                  raise SystemExit(1)
              if not eligible_for_sovereign_release:
                  print(
                      f"Policy violation: {claim_level} requires eligible_for_sovereign_release=true.",
                      file=sys.stderr,
                  )
                  raise SystemExit(1)

          print("Crypto claim policy enforcement PASS")
          PY

      - name: Hybrid-sign provenance payload
        run: |
          python3 - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path
          from scripts.crypto.jcs_rfc8785 import canonicalize_bytes

          truth_path = Path("artifacts/ci/hybrid_crypto_truth.json")
          if not truth_path.exists():
            raise SystemExit(f"missing truth artifact: {truth_path}")
          truth_bytes = truth_path.read_bytes()
          hybrid_crypto_truth = json.loads(truth_bytes.decode("utf-8"))
          hybrid_crypto_truth_sha256 = hashlib.sha256(truth_bytes).hexdigest()

          payload = {
            "artifactType": "ethicbit_ci_attestation_payload",
            "repository": "${{ github.repository }}",
            "ref": "${{ github.ref }}",
            "sha": "${{ github.sha }}",
            "run_id": "${{ github.run_id }}",
            "ed25519_key_source": os.environ.get("ETHICBIT_ED25519_KEY_SOURCE", "unknown"),
            "mldsa_key_source": os.environ.get("ETHICBIT_MLDSA_KEY_SOURCE", "unknown"),
            "mldsa_effective_mode": os.environ.get("ETHICBIT_MLDSA_EFFECTIVE_MODE", "unknown"),
            "hybrid_claim_mode": os.environ.get("ETHICBIT_HYBRID_CLAIM_MODE", "unknown"),
            "crypto_mode_effective": os.environ.get("ETHICBIT_CRYPTO_MODE_EFFECTIVE", "unknown"),
            "mldsa_mode": os.environ.get("ETHICBIT_MLDSA_MODE", "unknown"),
            "key_provenance_mode": os.environ.get("ETHICBIT_KEY_PROVENANCE_MODE", "unknown"),
            "crypto_claim_tier": os.environ.get("ETHICBIT_CRYPTO_CLAIM_TIER", "unspecified"),
            "audit_require_hybrid": os.environ.get("ETHICBIT_AUDIT_REQUIRE_HYBRID", "0"),
            "release_class": os.environ.get("ETHICBIT_RELEASE_CLASS", "branch_ci"),
            "claim_level": os.environ.get("ETHICBIT_CLAIM_LEVEL", "ci_grade"),
            "require_native_hybrid": os.environ.get("ETHICBIT_REQUIRE_NATIVE_HYBRID", "0").lower() in {"1", "true", "yes"},
            "ephemeral_keys_used": os.environ.get("ETHICBIT_EPHEMERAL_KEYS_USED", "true").lower() == "true",
            "runner_supports_mldsa": os.environ.get("ETHICBIT_RUNNER_SUPPORTS_MLDSA", "false").lower() == "true",
            "eligible_for_sovereign_release": os.environ.get("ETHICBIT_ELIGIBLE_FOR_SOVEREIGN_RELEASE", "false").lower() == "true",
            "hybrid_crypto_truth_sha256": hybrid_crypto_truth_sha256,
            "hybrid_crypto_truth": hybrid_crypto_truth
          }
          Path("provenance/payload.json").write_text(
            json.dumps(payload, indent=2, ensure_ascii=False) + "\n",
            encoding="utf-8"
          )
          Path("provenance/payload.jcs.json").write_bytes(canonicalize_bytes(payload))
          PY

          extra_sign_args=()
          if [[ "${ETHICBIT_REQUIRE_NATIVE_HYBRID}" == "1" ]]; then
            extra_sign_args+=(--require-native-hybrid)
          fi

          python3 scripts/crypto/hybrid_sign.py \
            provenance/payload.json \
            --output attestation/hybrid_signature_set.json \
            --risk-mode STANDARD \
            --ed25519-sign-cmd "$ETHICBIT_ED25519_SIGN_CMD" \
            --mldsa-sign-cmd "$ETHICBIT_MLDSA_SIGN_CMD" \
            --ed25519-key-id "$ETHICBIT_ED25519_KEY_ID" \
            --mldsa-key-id "$ETHICBIT_MLDSA_KEY_ID" \
            --crypto-truth-json artifacts/ci/hybrid_crypto_truth.json \
            --claim-level "$ETHICBIT_CLAIM_LEVEL" \
            "${extra_sign_args[@]}"

      - name: Verify hybrid signatures
        run: |
          python3 scripts/crypto/hybrid_verify.py \
            --payload provenance/payload.jcs.json \
            --signature-set attestation/hybrid_signature_set.json \
            --risk-mode STANDARD \
            --ed25519-verify-cmd "$ETHICBIT_ED25519_VERIFY_CMD" \
            --mldsa-verify-cmd "$ETHICBIT_MLDSA_VERIFY_CMD"

      - name: Run full audit
        run: |
          chmod +x ./audit.sh
          echo "ETHICBIT_AUDIT_REQUIRE_HYBRID=${ETHICBIT_AUDIT_REQUIRE_HYBRID}"
          echo "ETHICBIT_CRYPTO_MODE_EFFECTIVE=${ETHICBIT_CRYPTO_MODE_EFFECTIVE}"
          echo "ETHICBIT_KEY_PROVENANCE_MODE=${ETHICBIT_KEY_PROVENANCE_MODE}"
          echo "ETHICBIT_MLDSA_MODE=${ETHICBIT_MLDSA_MODE}"
          echo "ETHICBIT_CRYPTO_CLAIM_TIER=${ETHICBIT_CRYPTO_CLAIM_TIER}"
          ETHICBIT_AUDIT_RISK_MODE=STANDARD \
          ETHICBIT_AUDIT_REQUIRE_HYBRID="${ETHICBIT_AUDIT_REQUIRE_HYBRID}" \
          ./audit.sh

      - name: Upload GitHub provenance attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            provenance/payload.jcs.json
            attestation/hybrid_signature_set.json

      - name: Upload CI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ethicbit-slsa-hybrid-attestation-${{ github.run_id }}
          path: |
            provenance/payload.json
            provenance/payload.jcs.json
            attestation/hybrid_signature_set.json
            artifacts/history/swarm/official_operational_status.json
            results/GATE_REPORT.json
            results/constitutional_controls_report.json
            artifacts/history/swarm/triple_public_anchor_live_verification.json
            artifacts/ci/signing_environment_report.json
            artifacts/ci/hybrid_mode_effective.json
            artifacts/ci/hybrid_crypto_truth.json
