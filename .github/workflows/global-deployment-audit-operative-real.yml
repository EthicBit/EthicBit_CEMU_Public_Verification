name: Global Deployment Audit Operative Real

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  global-deployment-audit-operative-real:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run operative global deployment audit check
        run: python3 tools/checks/check_global_deployment_audit_operative.py

      - name: Require generated audit artifacts
        run: |
          test -f reports/operative_checks/global_deployment_audit_operative_check.json
          test -f audit/deployment/global_deployment_audit_report.json
          test -f logs/global_deployment_audit_operative.log
