name: SLSA L4 Operative Real

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  slsa-l4-operative-real:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run operative SLSA check
        run: python3 tools/checks/check_slsa_l4_operative.py

      - name: Require operative report
        run: |
          test -f reports/operative_checks/slsa_l4_operative_check.json
          test -f attestations/slsa_l4_operative_attestation.json
          test -f logs/slsa_l4_operative.log
