name: Global Regulatory Certification Operative Real

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  global-regulatory-certification-operative-real:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run operative global regulatory certification check
        run: python3 tools/checks/check_global_regulatory_certification_operative.py

      - name: Require generated regulatory artifacts
        run: |
          test -f reports/operative_checks/global_regulatory_certification_operative_check.json
          test -f audit/regulatory/global_regulatory_certification_report.json
          test -f logs/global_regulatory_certification_operative.log
