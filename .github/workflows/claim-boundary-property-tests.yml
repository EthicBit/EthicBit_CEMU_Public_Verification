name: Claim Boundary Property Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  property-tests:
    name: Hypothesis property tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Restore Hypothesis database
        uses: actions/cache@v4
        with:
          path: tests/.hypothesis
          key: hypothesis-db-${{ runner.os }}-${{ hashFiles('tests/test_claim_boundary_properties.py') }}
          restore-keys: hypothesis-db-${{ runner.os }}-

      - name: Run claim-boundary property tests
        run: pytest tests/test_claim_boundary_properties.py -v --tb=short

      - name: Run deterministic red-team corpus
        run: python3 tools/external_validation/claim_red_team/run_claim_red_team.py --dry-run
