name: Production Distributed Ready Negative

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  production-distributed-ready-negative:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run negative final readiness gate
        run: python3 tools/checks/check_production_distributed_ready_negative.py

      - name: Require generated negative readiness artifacts
        run: |
          test -f reports/final_checks/production_distributed_ready_negative_check.json
          test -f artifacts/production_distributed_readiness_negative_certificate.json
          test -f logs/production_distributed_ready_negative.log
