name: Official Periodic Audit

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: read

jobs:
  official-periodic-audit:
    runs-on: ubuntu-latest
    env:
      ETHICBIT_RISK_MODE: HIGH
      ETH_RPC_URL: http://127.0.0.1:8545
      ETHICBIT_ED25519_SIGN_CMD: assurance/signers/ed25519_sign.sh {payload}
      ETHICBIT_MLDSA_SIGN_CMD: assurance/signers/mldsa_sign.sh {payload}
      ETHICBIT_ED25519_VERIFY_CMD: assurance/signers/ed25519_verify.sh {payload} {signature}
      ETHICBIT_MLDSA_VERIFY_CMD: assurance/signers/mldsa_verify.sh {payload} {signature}
      ETHICBIT_ED25519_KEY_ID: ETHICBIT_ED25519_PERIODIC_SECRET_V1
      ETHICBIT_MLDSA_KEY_ID: ETHICBIT_MLDSA65_PERIODIC_NATIVE_SECRET_V1
      ETHICBIT_ME_GATE_REQUIRED_SECTORS: CORE,JUSTICIA,FINANZAS,SECURITY,TECHNICAL,LEGAL,REGULATORY
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Prepare hybrid signing keys
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p assurance/keys
          printf '%s' "${{ secrets.ETHICBIT_ED25519_PRIVATE_KEY_PEM }}" > assurance/keys/ed25519_private.pem
          printf '%s' "${{ secrets.ETHICBIT_ED25519_PUBLIC_KEY_PEM }}" > assurance/keys/ed25519_public.pem
          printf '%s' "${{ secrets.ETHICBIT_MLDSA_PRIVATE_KEY_PEM }}" > assurance/keys/mldsa_private.pem
          printf '%s' "${{ secrets.ETHICBIT_MLDSA_PUBLIC_KEY_PEM }}" > assurance/keys/mldsa_public.pem
          for key_file in assurance/keys/ed25519_private.pem assurance/keys/ed25519_public.pem assurance/keys/mldsa_private.pem assurance/keys/mldsa_public.pem; do
            if [ ! -s "$key_file" ]; then
              echo "Missing required signing secret material: $key_file" >&2
              exit 1
            fi
          done

          # Periodic audits run on generic hosted runners. If native ML-DSA is
          # unavailable in the runner OpenSSL build, downgrade to a compatible
          # fallback keypair while keeping strict signature enforcement active.
          mldsa_effective_mode="native_mldsa"
          mldsa_key_id="ETHICBIT_MLDSA65_PERIODIC_NATIVE_SECRET_V1"
          runner_supports_mldsa="true"
          printf '{"artifactType":"periodic_mldsa_probe"}' >/tmp/periodic_mldsa_probe.json
          if ! openssl pkeyutl -sign -inkey assurance/keys/mldsa_private.pem -rawin -in /tmp/periodic_mldsa_probe.json -out /tmp/periodic_mldsa_probe.sig >/tmp/periodic_mldsa_probe.err 2>&1; then
            echo "ML-DSA secret key unsupported on this runner; enabling compatibility fallback."
            openssl genpkey -algorithm Ed25519 -out assurance/keys/mldsa_private.pem
            openssl pkey -in assurance/keys/mldsa_private.pem -pubout -out assurance/keys/mldsa_public.pem
            openssl pkeyutl -sign -inkey assurance/keys/mldsa_private.pem -rawin -in /tmp/periodic_mldsa_probe.json -out /tmp/periodic_mldsa_probe.sig
            mldsa_effective_mode="compatibility_fallback"
            mldsa_key_id="ETHICBIT_MLDSA_COMPAT_ED25519_PERIODIC_V1"
            runner_supports_mldsa="false"
          fi

          {
            echo "ETHICBIT_MLDSA_EFFECTIVE_MODE=${mldsa_effective_mode}"
            echo "ETHICBIT_MLDSA_MODE=${mldsa_effective_mode}"
            echo "ETHICBIT_MLDSA_KEY_ID=${mldsa_key_id}"
            echo "ETHICBIT_RUNNER_SUPPORTS_MLDSA=${runner_supports_mldsa}"
          } >> "$GITHUB_ENV"

          chmod 600 assurance/keys/*.pem

      - name: Export key paths
        shell: bash
        run: |
          {
            echo "ETHICBIT_ED25519_PRIVATE_KEY=${{ github.workspace }}/assurance/keys/ed25519_private.pem"
            echo "ETHICBIT_ED25519_PUBLIC_KEY=${{ github.workspace }}/assurance/keys/ed25519_public.pem"
            echo "ETHICBIT_MLDSA_PRIVATE_KEY=${{ github.workspace }}/assurance/keys/mldsa_private.pem"
            echo "ETHICBIT_MLDSA_PUBLIC_KEY=${{ github.workspace }}/assurance/keys/mldsa_public.pem"
          } >> "$GITHUB_ENV"

      - name: Ensure scripts are executable
        run: |
          chmod +x scripts/run_mixed_audience_audit.sh
          chmod +x scripts/status/official_operational_status_calculator.py
          chmod +x scripts/status/write_periodic_audit_receipt.py
          chmod +x assurance/signers/ed25519_sign.sh
          chmod +x assurance/signers/ed25519_verify.sh
          chmod +x assurance/signers/mldsa_sign.sh
          chmod +x assurance/signers/mldsa_verify.sh

      - name: Run mixed audience gates
        run: ./scripts/run_mixed_audience_audit.sh --all

      - name: Enforce Mechanical Ethics gate integrity
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          required = [
              "CORE",
              "JUSTICIA",
              "FINANZAS",
              "SECURITY",
              "TECHNICAL",
              "LEGAL",
              "REGULATORY",
          ]

          gate_path = Path("results/mechanical_ethics_gate.json")
          if not gate_path.exists():
              raise SystemExit("Missing results/mechanical_ethics_gate.json")

          gate = json.loads(gate_path.read_text(encoding="utf-8"))
          if gate.get("status") != "PASS":
              raise SystemExit(
                  f"Mechanical ethics gate status is not PASS: {gate.get('status')}"
              )

          validated = set(gate.get("validated_sectors", []))
          missing_required = [sector for sector in required if sector not in validated]
          if missing_required:
              raise SystemExit(
                  "Mechanical ethics gate missing required sectors: "
                  + ",".join(missing_required)
              )

          if gate.get("l4_foundational_validated") is not True:
              raise SystemExit(
                  "Mechanical ethics gate L4 foundational validation is not true"
              )

          print("mechanical_ethics_gate: PASS (periodic audit)")
          PY

      - name: Compute official status
        run: ./scripts/status/official_operational_status_calculator.py --root . --strict --require-signature

      - name: Write periodic audit receipt
        if: always()
        run: ./scripts/status/write_periodic_audit_receipt.py --root .

      - name: Upload periodic audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: official-periodic-audit-${{ github.run_id }}
          path: |
            results/GATE_REPORT.json
            results/mechanical_ethics_gate.json
            results/index.json
            artifacts/history/swarm/official_operational_status.json
            artifacts/history/swarm/periodic_audit_receipt.json
