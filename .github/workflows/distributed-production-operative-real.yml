name: Distributed Production Operative Real

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  distributed-production-operative-real:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run operative distributed production check
        run: python3 tools/checks/check_distributed_production_operative.py

      - name: Require generated deployment artifacts
        run: |
          test -f reports/operative_checks/distributed_production_operative_check.json
          test -f audit/deployment/distributed_production_certification_report.json
          test -f logs/distributed_production_operative.log
