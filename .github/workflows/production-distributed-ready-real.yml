name: Production Distributed Ready Real

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  production-distributed-ready-real:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run final readiness check
        run: python3 tools/checks/check_production_distributed_ready.py

      - name: Require generated readiness artifacts
        run: |
          test -f reports/operative_checks/production_distributed_ready_check.json
          test -f artifacts/production_distributed_readiness_certificate.json
          test -f logs/production_distributed_ready.log
